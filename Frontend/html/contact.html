<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us - Veloura Beauty</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #fff5f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    .background-ornaments {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
    }

    .orb-1 {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle at 30% 30%, #ffe4ec, #ffd0df);
      top: -300px;
      right: -200px;
      animation: float 25s ease-in-out infinite;
    }

    .orb-2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle at 70% 70%, #ffeaf1, #ffe0ea);
      bottom: -300px;
      left: -200px;
      animation: float 30s ease-in-out infinite reverse;
    }

    .orb-3 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle at 50% 50%, #fff0f5, #ffe4ed);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float 35s ease-in-out infinite;
    }

    .grid-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 192, 203, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 192, 203, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -40px) scale(1.05); }
    }

    .contact-section {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 48px;
      padding: 60px;
      box-shadow: 
        0 40px 70px -20px rgba(255, 140, 170, 0.3),
        0 10px 30px -10px rgba(255, 180, 200, 0.2),
        inset 0 1px 1px rgba(255, 255, 255, 0.8);
    }

    .contact-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .badge {
      display: inline-block;
      padding: 8px 22px;
      background: rgba(255, 230, 240, 0.7);
      border: 1px solid rgba(255, 200, 215, 0.5);
      border-radius: 40px;
      color: #b35f7b;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
      backdrop-filter: blur(5px);
    }

    h2 {
      font-size: 64px;
      font-weight: 600;
      color: #3d2b33;
      margin-bottom: 20px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .gradient-text {
      background: linear-gradient(135deg, #b35f7b, #ff99bb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 18px;
      color: #7a6670;
      max-width: 550px;
      margin: 0 auto;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Two-column layout */
    .contact-container {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 50px;
      align-items: start;
    }

    /* Contact info section - soft pink */
    .contact-info {
      background: rgba(255, 240, 245, 0.7);
      border-radius: 32px;
      padding: 35px;
      border: 1px solid rgba(255, 200, 215, 0.4);
      backdrop-filter: blur(5px);
    }

    .info-item {
      display: flex;
      gap: 18px;
      padding: 24px 0;
      border-bottom: 1px solid rgba(255, 170, 190, 0.2);
    }

    .info-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .info-item:first-child {
      padding-top: 0;
    }

    .icon-wrapper {
      width: 52px;
      height: 52px;
      background: white;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #b35f7b;
      border: 1px solid rgba(255, 200, 215, 0.6);
      box-shadow: 0 5px 15px -5px rgba(255, 150, 180, 0.3);
    }

    .info-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .info-label {
      font-size: 14px;
      color: #b38297;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .info-value {
      font-size: 16px;
      color: #4a3640;
      font-weight: 600;
    }

    .social-links {
      display: flex;
      gap: 12px;
      margin-top: 6px;
    }

    .social-link {
      width: 44px;
      height: 44px;
      background: white;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b35f7b;
      text-decoration: none;
      font-size: 20px;
      border: 1px solid rgba(255, 200, 215, 0.5);
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px -5px rgba(255, 150, 180, 0.2);
    }

    .social-link:hover {
      background: #b35f7b;
      color: white;
      transform: translateY(-3px);
      border-color: #b35f7b;
      box-shadow: 0 10px 20px -5px rgba(179, 95, 123, 0.4);
    }

    /* Form styles */
    form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .input-group {
      position: relative;
      width: 100%;
    }

    .input-group.full-width {
      grid-column: 1 / -1;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 18px 20px;
      font-size: 16px;
      font-family: 'Space Grotesk', sans-serif;
      background: white;
      border: 2px solid #ffe4ec;
      border-radius: 20px;
      color: #3d2b33;
      transition: all 0.3s ease;
      font-weight: 400;
      resize: none;
      box-shadow: 0 5px 15px -5px rgba(255, 180, 200, 0.2);
    }

    .input-group textarea {
      min-height: 120px;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #ffb3c6;
      background: white;
      box-shadow: 0 8px 20px -8px rgba(255, 130, 160, 0.3);
    }

    .input-group label {
      position: absolute;
      left: 20px;
      top: 18px;
      color: #b38297;
      font-size: 16px;
      font-weight: 400;
      transition: all 0.3s ease;
      pointer-events: none;
      background: white;
      padding: 0 8px;
      border-radius: 20px;
    }

    .input-group input:focus ~ label,
    .input-group input:not(:placeholder-shown) ~ label,
    .input-group textarea:focus ~ label,
    .input-group textarea:not(:placeholder-shown) ~ label {
      top: -10px;
      left: 12px;
      font-size: 13px;
      color: #b35f7b;
      font-weight: 600;
      background: white;
      padding: 0 8px;
      border-radius: 20px;
    }

    .input-group input::placeholder,
    .input-group textarea::placeholder {
      color: transparent;
    }

    
    .input-highlight {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffb3c6, #b35f7b, #ffb3c6, transparent);
      transition: all 0.4s ease;
      transform: translateX(-50%);
      border-radius: 2px;
    }

    .input-group input:focus ~ .input-highlight,
    .input-group textarea:focus ~ .input-highlight {
      width: 80%;
    }

    /* Submit button - pink gradient */
    .submit-btn {
      position: relative;
      background: linear-gradient(135deg, #b35f7b, #ff99bb, #b35f7b);
      background-size: 200% 200%;
      border: none;
      border-radius: 40px;
      padding: 20px 32px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Space Grotesk', sans-serif;
      color: white;
      cursor: pointer;
      transition: all 0.4s ease;
      margin-top: 8px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 25px -5px rgba(179, 95, 123, 0.4);
    }

    .submit-btn span {
      position: relative;
      z-index: 2;
    }

    .submit-btn i {
      position: relative;
      z-index: 2;
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .submit-btn:hover i {
      transform: translateX(5px) rotate(45deg);
    }

    .submit-btn:hover {
      background-position: right center;
      transform: translateY(-3px);
      box-shadow: 0 15px 30px -5px rgba(179, 95, 123, 0.5);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .btn-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.8), transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.6s ease;
      pointer-events: none;
      z-index: 1;
    }

    .submit-btn:hover .btn-glow {
      transform: translate(-50%, -50%) scale(1);
    }

    .form-status {
      margin-top: 20px;
      padding: 16px 24px;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      animation: slideUp 0.3s ease;
      border: 1px solid;
    }

    .form-status.success {
      background: #fff0f5;
      border-color: #ffccdd;
      color: #9f5f7a;
    }

    .form-status.error {
      background: #fff0f2;
      border-color: #ffccd1;
      color: #b36b7a;
    }

    .form-status i {
      font-size: 18px;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fa-spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Responsive design */
    @media (max-width: 900px) {
      .contact-section {
        padding: 40px;
      }

      .contact-container {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      h2 {
        font-size: 48px;
      }
    }

    @media (max-width: 600px) {
      .contact-section {
        padding: 30px 20px;
        border-radius: 32px;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }

      h2 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 16px;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #fff0f5;
    }

    ::-webkit-scrollbar-thumb {
      background: #ffb6c1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ff9eb0;
    }
  </style>
</head>
<body>
  <div class="background-ornaments">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-pattern"></div>
  </div>

  <section class="contact-section">
    <div class="contact-header">
      <span class="badge">GET IN TOUCH</span>
      <h2>Let's <span class="gradient-text">Connect</span></h2>
      <p class="subtitle">We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>
    </div>

    <div class="contact-container">
      <div class="contact-info">
        <div class="info-item">
          <div class="icon-wrapper">
            <i class="fa-regular fa-envelope"></i>
          </div>
          <div class="info-content">
            <span class="info-label">Email us</span>
            <span class="info-value">hello@velourabeauty.com</span>
          </div>
        </div>
        
        <div class="info-item">
          <div class="icon-wrapper">
            <i class="fa-regular fa-clock"></i>
          </div>
          <div class="info-content">
            <span class="info-label">Response time</span>
            <span class="info-value">Within 24 hours</span>
          </div>
        </div>

        <div class="info-item">
          <div class="icon-wrapper">
            <i class="fa-regular fa-message"></i>
          </div>
          <div class="info-content">
            <span class="info-label">Follow us</span>
            <div class="social-links">
              <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
              <a href="#" class="social-link"><i class="fa-brands fa-pinterest"></i></a>
              <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
            </div>
          </div>
        </div>
      </div>

     <form id="contact-form" action="/contact" method="POST" novalidate>
        <div class="form-row">
          <div class="input-group">
            <input type="text" id="name" name="name" required autocomplete="off" />
            <label for="name">Full name</label>
            <div class="input-highlight"></div>
          </div>

          <div class="input-group">
            <input type="email" id="email" name="email" required autocomplete="off" />
            <label for="email">Email address</label>
            <div class="input-highlight"></div>
          </div>
        </div>

        <div class="input-group full-width">
          <textarea id="message" name="message" rows="4" required></textarea>
          <label for="message">Your message</label>
          <div class="input-highlight"></div>
        </div>

        <button type="submit" class="submit-btn">
          <span>Send message</span>
          <i class="fa-regular fa-paper-plane"></i>
          <div class="btn-glow"></div>
        </button>
        
        <div id="form-status"></div>
      </form>
    </div>
  </section>

<script>
    const form = document.getElementById('contact-form');
    const statusDiv = document.getElementById('form-status');

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        statusDiv.textContent = '';
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span>Sending...</span> <i class="fa-regular fa-spinner fa-spin"></i>';

        const name = form.name.value.trim();
        const email = form.email.value.trim();
        const message = form.message.value.trim();

        if (!name || !email || !message) {
            statusDiv.className = 'form-status error';
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Please fill out all fields.';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Send message</span> <i class="fa-regular fa-paper-plane"></i>';
            return;
        }

        try {
            const response = await fetch('http://localhost:3000/api/contact', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ name, email, message })
            });

            const result = await response.json();
            
            if (result.success) {
                statusDiv.className = 'form-status success';
                statusDiv.innerHTML = '<i class="fa-regular fa-circle-check"></i> Thank you for contacting us! We will get back to you shortly.';
                form.reset();
            } else {
                throw new Error('Server error');
            }
        } catch (error) {
            statusDiv.className = 'form-status error';
            statusDiv.innerHTML = '<i class="fa-regular fa-circle-exclamation"></i> Failed to send. Try again.';
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>Send message</span> <i class="fa-regular fa-paper-plane"></i>';
        }
    });
</script>

</body>
</html>
